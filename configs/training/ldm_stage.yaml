seed: 42
data:
  root: /path/to/data_root
  val_ratio: 0.01
  num_frames: 12
  size: 96
  max_videos: null
  cache_videos: false
first_stage:
  in_channels: 1
  out_ch: 1
  z_channels: 4
  base_channels: 128
  channel_mult: [1, 2, 4, 4]
  num_res_blocks: 2
conditioning:
  context_dim: 512
  motion_bins: 32
diffusion_model:
  in_channels: 8
  out_channels: 4
  model_channels: 192
  channel_mult: [1, 2, 4, 4]
  num_res_blocks: 2
  context_dim: 512
  use_checkpoint: true
sigma:
  sigma_min: 0.02
  sigma_max: 1.0
  rho: 7.0
training:
  ae_ckpt: outputs/ae/ae_last.pt
  batch_size: 2
  num_workers: 4
  lr: 0.0001
  epochs: 40
  amp: true
  ema_decay: 0.999
  cfg_dropout: 0.1
  min_snr_gamma: 5.0
  out_dir: outputs/ldm
